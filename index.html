<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateWars // Ascended Database</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c10;
  --bg2:#0d1219;
  --bg3:#121820;
  --panel:#0a1018;
  --border:#1a2a3a;
  --border2:#1e3448;
  --accent:#00d4ff;
  --accent2:#0099cc;
  --accent3:#ff8c00;
  --danger:#ff3366;
  --text:#c8dde8;
  --text2:#6a8a9a;
  --text3:#3a5a6a;
  --mono:'Share Tech Mono',monospace;
  --sans:'Rajdhani',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}

/* scanline overlay */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;
  background:linear-gradient(180deg,#0a1520 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(8px);
}
.logo-title{
  font-family:var(--mono);font-size:22px;letter-spacing:4px;
  color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,.5);
}
.logo-title span{color:var(--accent3)}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:3px;margin-top:3px}

.header-stats{display:flex;gap:24px}
.stat-box{text-align:center;padding:8px 20px;border:1px solid var(--border2);background:var(--bg2)}
.stat-num{font-family:var(--mono);font-size:24px;color:var(--accent3);text-shadow:0 0 10px rgba(255,140,0,.4)}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:2px}

/* SEARCH BAR */
.search-section{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:16px 32px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}
.search-wrap{
  flex:1;min-width:200px;display:flex;align-items:center;
  border:1px solid var(--border2);background:var(--panel);
  padding:0 14px;gap:10px;
}
.search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 1px rgba(0,212,255,.2)}
.search-icon{font-size:18px;color:var(--text3)}
#search{
  flex:1;background:none;border:none;outline:none;
  font-family:var(--mono);font-size:13px;color:var(--text);
  padding:10px 0;
}
#search::placeholder{color:var(--text3)}
.filter-btn{
  font-family:var(--mono);font-size:11px;letter-spacing:1px;
  padding:8px 16px;border:1px solid var(--border2);
  background:var(--panel);color:var(--text2);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06)}
.result-count{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap}

/* TABLE */
.table-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;margin:24px 32px}
.table-header{
  display:grid;grid-template-columns:50px 100px 1fr 120px;
  background:var(--bg3);border:1px solid var(--border2);
  border-bottom:none;padding:10px 16px;
}
.th{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px}
.table-body{
  flex:1;overflow-y:auto;border:1px solid var(--border2);
  background:var(--panel);
  max-height:calc(100vh - 280px);
}
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-track{background:var(--bg)}
.table-body::-webkit-scrollbar-thumb{background:var(--border2)}
.table-body::-webkit-scrollbar-thumb:hover{background:var(--accent2)}

.row{
  display:grid;grid-template-columns:50px 100px 1fr 120px;
  padding:9px 16px;border-bottom:1px solid var(--border);
  transition:background .1s;cursor:default;
  align-items:center;
}
.row:hover{background:rgba(0,212,255,.04)}
.row:last-child{border-bottom:none}
.row-num{font-family:var(--mono);font-size:11px;color:var(--text3)}
.row-asc{font-family:var(--mono);font-size:12px;color:var(--accent2)}
.row-name{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--text);padding:0 8px}
.row-main{font-family:var(--mono);font-size:12px;color:var(--text2)}
mark{background:rgba(255,140,0,.25);color:var(--accent3);border-radius:2px}
.no-results{padding:60px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--text3);letter-spacing:2px}

/* FOOTER */
footer{
  padding:16px 32px;
  background:var(--bg2);border-top:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.footer-btns{display:flex;gap:10px}
.footer-btn{
  font-family:var(--mono);font-size:11px;letter-spacing:1px;
  padding:9px 20px;border:1px solid;cursor:pointer;
  background:none;transition:all .15s;
}
.btn-export{border-color:var(--accent2);color:var(--accent2)}
.btn-export:hover{background:rgba(0,153,204,.15);box-shadow:0 0 12px rgba(0,153,204,.2)}
.btn-import{border-color:var(--accent3);color:var(--accent3)}
.btn-import:hover{background:rgba(255,140,0,.1);box-shadow:0 0 12px rgba(255,140,0,.2)}
.btn-save{border-color:var(--danger);color:var(--danger)}
.btn-save:hover{background:rgba(255,51,102,.1);box-shadow:0 0 12px rgba(255,51,102,.2)}
.footer-info{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;z-index:1000;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  padding:32px;min-width:380px;max-width:90vw;
  box-shadow:0 0 60px rgba(0,212,255,.1);
}
.modal-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:3px;margin-bottom:20px}
.modal label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:1px;display:block;margin-bottom:6px}
.modal input[type=password],.modal input[type=text]{
  width:100%;background:var(--panel);border:1px solid var(--border2);
  color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 14px;
  outline:none;margin-bottom:16px;
}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:4px}
.modal-ok{
  flex:1;font-family:var(--mono);font-size:11px;letter-spacing:1px;
  padding:10px;border:1px solid var(--accent);color:var(--accent);
  background:none;cursor:pointer;
}
.modal-ok:hover{background:rgba(0,212,255,.1)}
.modal-cancel{
  font-family:var(--mono);font-size:11px;letter-spacing:1px;
  padding:10px 20px;border:1px solid var(--border2);color:var(--text3);
  background:none;cursor:pointer;
}
.modal-cancel:hover{border-color:var(--danger);color:var(--danger)}
.modal-msg{font-family:var(--mono);font-size:11px;color:var(--accent3);margin-top:12px;min-height:16px}
.modal-err{color:var(--danger)}

/* drop zone */
.drop-zone{
  border:1px dashed var(--border2);padding:28px;text-align:center;
  font-family:var(--mono);font-size:11px;color:var(--text3);
  letter-spacing:1px;cursor:pointer;margin-bottom:16px;
  transition:all .15s;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent3);color:var(--accent3);background:rgba(255,140,0,.04)}
</style>
</head>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <div class="modal-title">// IMPORT CSV</div>
    <label>PASSWORD</label>
    <input type="password" id="import-pw" placeholder="Enter password..." autocomplete="off">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      DROP CSV HERE OR CLICK TO BROWSE
      <input type="file" id="file-input" accept=".csv" style="display:none">
    </div>
    <div class="modal-msg" id="import-msg"></div>
    <div class="modal-btns">
      <button class="modal-ok" onclick="doImport()">IMPORT</button>
      <button class="modal-cancel" onclick="closeModal('import-modal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <div class="modal-title">// EXPORT CSV</div>
    <label>PASSWORD</label>
    <input type="password" id="export-pw" placeholder="Enter password..." autocomplete="off">
    <div class="modal-msg" id="export-msg"></div>
    <div class="modal-btns">
      <button class="modal-ok" onclick="doExport()">EXPORT</button>
      <button class="modal-cancel" onclick="closeModal('export-modal')">CANCEL</button>
    </div>
  </div>
</div>

<!-- SAVE MODAL -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <div class="modal-title">// SAVE SITE</div>
    <label>PASSWORD</label>
    <input type="password" id="save-pw" placeholder="Enter password..." autocomplete="off">
    <div class="modal-msg" id="save-msg"></div>
    <div class="modal-btns">
      <button class="modal-ok" onclick="doSave()">DOWNLOAD NEW INDEX.HTML</button>
      <button class="modal-cancel" onclick="closeModal('save-modal')">CANCEL</button>
    </div>
  </div>
</div>

<header>

</header>

<div class="search-section">

</div>

<div class="table-wrap">

  <div class="table-body" id="table-body">

  </div>
</div>

<footer>

  </div>

</footer>

let DATA = INITIAL_DATA.map(r=>[...r]);
let sortCol='asc', sortDir=1, query='', filtered=[...DATA];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hl(text,q){
  if(!q) return esc(text);
  const e=esc(text), eq=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return e.replace(new RegExp(`(${eq})`,'gi'),'<mark>$1</mark>');
}

const PAGE=100;
let rendered=0;
const tbody=document.getElementById('table-body');

function applySort(){
  const col=sortCol;
  filtered.sort((a,b)=>{
    let av=col==='asc'?a[0]:col==='main'?a[1]:a[2];
    let bv=col==='asc'?b[0]:col==='main'?b[1]:b[2];
    if(typeof av==='number') return sortDir*(av-bv);
    return sortDir*String(av).localeCompare(String(bv));
  });
}

function applyFilter(){
  const q=query.toLowerCase();
  filtered=DATA.filter(r=>!q||String(r[0]).includes(q)||String(r[1]).includes(q)||r[2].toLowerCase().includes(q));
  applySort();
  rendered=0;
  tbody.innerHTML='';
  renderMore();
  updateCounts();
}

function renderMore(){
  const chunk=filtered.slice(rendered,rendered+PAGE);
  if(!chunk.length){
    if(!rendered) tbody.innerHTML='<div class="no-results">// NO RESULTS FOUND //</div>';
    return;
  }
  const frag=document.createDocumentFragment();
  chunk.forEach((r,i)=>{
    const q=query;
    const div=document.createElement('div');
    div.className='row';
    div.innerHTML=`<div class="row-num">${rendered+i+1}</div><div class="row-asc">${hl(String(r[0]),q)}</div><div class="row-name">${hl(r[2],q)}</div><div class="row-main">${hl(String(r[1]),q)}</div>`;
    frag.appendChild(div);
  });
  tbody.appendChild(frag);
  rendered+=chunk.length;
}

tbody.addEventListener('scroll',()=>{
  if(tbody.scrollTop+tbody.clientHeight>=tbody.scrollHeight-100) renderMore();
});

function updateCounts(){
  document.getElementById('total-count').textContent=DATA.length;
  document.getElementById('total-count-footer').textContent=DATA.length;
  document.getElementById('visible-count').textContent=filtered.length;
  document.getElementById('count-display').textContent=filtered.length;
}

document.getElementById('footer-date').textContent=new Date().toLocaleDateString();

// Search
document.getElementById('search').addEventListener('input',e=>{
  query=e.target.value.trim();
  applyFilter();
});

// Sort buttons
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const s=btn.dataset.sort;
    if(sortCol===s){sortDir*=-1}else{sortCol=s;sortDir=1;}
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applySort();
    rendered=0;tbody.innerHTML='';renderMore();
  });
});

// Modal helpers
function openModal(id){
  document.getElementById(id).classList.add('open');
  // clear fields
  const pw=document.querySelector(`#${id} input[type=password]`);
  if(pw) pw.value='';
  const msg=document.querySelector(`#${id} .modal-msg`);
  if(msg){msg.textContent='';msg.className='modal-msg';}
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// close on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o) closeModal(o.id);});
});

// EXPORT
function doExport(){
  const pw=document.getElementById('export-pw').value;
  const msg=document.getElementById('export-msg');
  if(pw!==PASSWORD){msg.textContent='// INVALID PASSWORD';msg.classList.add('modal-err');return;}
  let csv='ascended_id,main_id,player_name\n';
  DATA.forEach(r=>csv+=`${r[0]},${r[1]},"${r[2].replace(/"/g,'""')}"\n`);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='gatewars_database.csv';a.click();
  closeModal('export-modal');
}

// IMPORT
let importedFile=null;
const dropZone=document.getElementById('drop-zone');
const fileInput=document.getElementById('file-input');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');importedFile=e.dataTransfer.files[0];dropZone.textContent=importedFile.name;});
fileInput.addEventListener('change',()=>{importedFile=fileInput.files[0];if(importedFile)dropZone.textContent=importedFile.name;});

function doImport(){
  const pw=document.getElementById('import-pw').value;
  const msg=document.getElementById('import-msg');
  if(pw!==PASSWORD){msg.textContent='// INVALID PASSWORD';msg.classList.add('modal-err');return;}
  if(!importedFile){msg.textContent='// SELECT A FILE FIRST';return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').slice(1);
    let added=0,skipped=0;
    const map=new Map(DATA.map(r=>[r[0],r]));
    lines.forEach(line=>{
      const parts=line.match(/^(\d+),(\d+),"?([^"]*)"?/);
      if(!parts) return;
      const [,a,m,n]=[...parts];
      const aid=parseInt(a),mid=parseInt(m);
      if(isNaN(aid)||isNaN(mid)){skipped++;return;}
      if(!map.has(aid)){map.set(aid,[aid,mid,n.trim()]);added++;}
    });
    DATA=[...map.values()].sort((a,b)=>a[0]-b[0]);
    query='';sortCol='asc';sortDir=1;
    applyFilter();
    msg.className='modal-msg';
    msg.textContent=`// IMPORTED: +${added} new, ${skipped} skipped`;
  };
  reader.readAsText(importedFile);
}

// SAVE
function doSave(){
  const pw=document.getElementById('save-pw').value;
  const msg=document.getElementById('save-msg');
  if(pw!==PASSWORD){msg.textContent='// INVALID PASSWORD';msg.classList.add('modal-err');return;}
  msg.textContent='// GENERATING...';
  setTimeout(()=>{
    // Build data block
    let dataStr='const INITIAL_DATA = [\n';
    DATA.forEach(r=>dataStr+=`[${r[0]},${r[1]},"${r[2].replace(/\\/g,'\\\\').replace(/"/g,'\\"')}"],\n`);
    dataStr+='];\n';
    // Get current page source and replace data block
    fetch(location.href)
      .then(r=>r.text())
      .then(html=>{
        const updated=html.replace(/const INITIAL_DATA = \[[\s\S]*?\];\n/,dataStr);
        const a=document.createElement('a');
        a.href=URL.createObjectURL(new Blob([updated],{type:'text/html'}));
        a.download='index.html';a.click();
        msg.textContent='// DOWNLOADED! Upload to GitHub.';
      })
      .catch(()=>msg.textContent='// ERROR — try re-downloading manually');
  },100);
}
